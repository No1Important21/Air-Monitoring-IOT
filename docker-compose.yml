services:
  # 1. MQTT Broker (Mosquitto) - Menggunakan metode auto-generate config
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "1883:1883"
    entrypoint: >
      sh -c "
      mkdir -p /mosquitto/config &&
      echo 'listener 1883 0.0.0.0' > /mosquitto/config/mosquitto.conf &&
      echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
      exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
      "

  # 2. Database (InfluxDB v2)
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword123
      - DOCKER_INFLUXDB_INIT_ORG=kantor-arsip
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=token-rahasia-admin-12345
    volumes:
      - influxdb-data:/var/lib/influxdb2

  # 3. Database Arsip (PostgreSQL) - opsional, untuk backup terstruktur & query SQL
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=arsip_admin
      - POSTGRES_PASSWORD=passwordarsip123
      - POSTGRES_DB=sensor_archive
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 4. Jembatan Data (Telegraf)
  telegraf:
    image: telegraf:latest
    container_name: telegraf
    depends_on:
      - mosquitto
      - influxdb
      - postgres
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./logs:/logs   # <-- folder log mentah (backup data, di luar InfluxDB)

  # 5. Visualisasi (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro   # <-- auto-setup datasource & dashboard

volumes:
  influxdb-data:
  grafana-data:
  postgres-data:
