[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = true

# 1. AMBIL DATA DARI MQTT BROKER
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "arsip/sensor",
  ]
  data_format = "json"
  # Menentukan tipe data agar terbaca sebagai angka di Grafana
  json_string_fields = []
  # CATATAN: field "timestamp" dari ESP32 SENGAJA TIDAK dijadikan waktu metrik
  # (json_time_key). Kalau dipaksakan, Telegraf akan melabeli jam WIB itu
  # sebagai UTC, sehingga data seolah "7 jam di masa depan" dan hilang dari
  # rentang waktu Grafana (No data). Field "timestamp" tetap otomatis ikut
  # tersimpan apa adanya sebagai field biasa (lihat fields.timestamp di log),
  # sedangkan waktu metrik yang dipakai grafik memakai waktu terima Telegraf
  # yang akurat (selisihnya cuma milidetik dari waktu ESP32 kirim).

# 2. KIRIM DATA KE INFLUXDB v2 (untuk visualisasi Grafana)
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "token-rahasia-admin-12345" # Token ini disamakan dengan di docker-compose
  organization = "kantor-arsip"
  bucket = "sensor_data"

# 3. SIMPAN JUGA KE POSTGRESQL (arsip terstruktur, bisa di-query pakai SQL biasa)
[[outputs.postgresql]]
  connection = "host=postgres user=arsip_admin password=passwordarsip123 dbname=sensor_archive sslmode=disable"
  # Wajib eksplisit true agar Telegraf otomatis membuat tabel & kolom baru
  # sesuai measurement/field yang masuk (defaultnya di beberapa versi = false)
  create_templates = ['CREATE TABLE {{.table}} ({{.columns}})']
  # Nama tabel otomatis dibuat sesuai nama measurement, di sini: "mqtt_consumer"
  # Kolom otomatis dibuat sesuai field: humidity, pressure, temperature, timestamp
  # serta kolom "time" (waktu metrik asli, akurat) dan "topic" (tag)

# 4. SIMPAN JUGA KE FILE LOG MENTAH (backup, mudah dibaca manusia/di-audit)
[[outputs.file]]
  files = ["/logs/sensor_data.log"]
  data_format = "json"
  # "timestamp" di level atas JSON log ini = waktu Telegraf menerima data,
  # AKURAT, tapi ditampilkan dalam UTC (mundur 7 jam dari WIB).
  # Untuk melihat jam WIB asli dari alat, lihat "fields.timestamp" di baris
  # yang sama -- itu string apa adanya yang dikirim ESP32.
  json_timestamp_format = "2006-01-02 15:04:05"
  # Log baru ditambah setiap flush_interval (5 detik), tidak menimpa file lama
